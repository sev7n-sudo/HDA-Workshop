version: "3.8"

services:
  web:
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "3010:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - workshop-net
    volumes:
      - ../src:/usr/src/app/src
      - ../public:/usr/src/app/public
      - ./seed:/usr/src/app/server/seed
    environment:
      NODE_ENV: development
      DATABASE_URL: "sqlite://:memory:"

  ubuntu-target:
    build:
      context: ./ubuntu-target
      dockerfile: Dockerfile
    networks:
      - workshop-net
    volumes:
      - ./ubuntu-target:/target
    environment:
      TARGET_ENV: development
    user: root
    command: ["bash", "-c", "sh /target/setup.sh && sleep infinity"]



networks:
  workshop-net:
    driver: bridge